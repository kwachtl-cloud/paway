# Build APK using GitHub Actions
name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Install dependencies
      run: npm install
      
    - name: Create .env file
      run: |
        echo "VITE_GOOGLE_MAPS_API_KEY=AIzaSyCT3CP1dnyycCUsvrmPjUWhaaKubSYC1AU" > .env
        echo "" >> .env
        echo "VITE_FIREBASE_API_KEY=AIzaSyC9zf8oO-stZFGmPUA8noKF3bsLvQr2yaI" >> .env
        echo "VITE_FIREBASE_AUTH_DOMAIN=paway-d9573.firebaseapp.com" >> .env
        echo "VITE_FIREBASE_PROJECT_ID=paway-d9573" >> .env
        echo "VITE_FIREBASE_STORAGE_BUCKET=paway-d9573.firebasestorage.app" >> .env
        echo "VITE_FIREBASE_MESSAGING_SENDER_ID=647433414021" >> .env
        echo "VITE_FIREBASE_APP_ID=1:647433414021:web:744a61385afb609f3450ec" >> .env
        echo "VITE_FIREBASE_MEASUREMENT_ID=G-19PVL5L2SN" >> .env
      
    - name: Build web app
      run: npm run build
      
    - name: Sync Capacitor
      run: npx cap sync android
      
    - name: Make gradlew executable
      run: chmod +x android/gradlew
      
    - name: Build Debug APK
      working-directory: ./android
      run: ./gradlew assembleDebug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 14
